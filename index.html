        if (imagens.length > 1) {
            for (let i = 0; i < imagens.length; i++) {
                dotsHtml += `<span class="dot ${i === 0 ? 'active' : ''}" data-index="${i}"></span>`;
            }
        }
        const slidesHtml = imagens.map((img, idx) => `
            <div class="carousel-slide">
                <img src="${img}" alt="Foto ${idx+1}" loading="lazy" onerror="this.src='https://placehold.co/600x400/eeeeee/999999?text=Erro+imagem'">
            </div>
        `).join('');
        return `
            <div class="carousel-container" id="${containerId}">
                <div class="carousel-slides" style="transform: translateX(0%);">
                    ${slidesHtml}
                </div>
                ${imagens.length > 1 ? `
                    <button class="carousel-btn btn-prev">‹</button>
                    <button class="carousel-btn btn-next">›</button>
                    <div class="carousel-dots">${dotsHtml}</div>
                ` : ''}
            </div>
        `;
    }

    function ativarCarrossel(produtoId, imagens) {
        const containerEl = document.getElementById(`carousel-${produtoId}`);
        if (!containerEl || imagens.length <= 1) return;
        const slidesDiv = containerEl.querySelector('.carousel-slides');
        const prevBtn = containerEl.querySelector('.btn-prev');
        const nextBtn = containerEl.querySelector('.btn-next');
        const dots = containerEl.querySelectorAll('.dot');
        let currentIndex = 0;
        const totalSlides = imagens.length;
        function updateCarousel(index) {
            if (index < 0) index = 0;
            if (index >= totalSlides) index = totalSlides - 1;
            currentIndex = index;
            slidesDiv.style.transform = `translateX(-${currentIndex * 100}%)`;
            dots.forEach((dot, i) => {
                if (i === currentIndex) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }
        function nextSlide() { updateCarousel(currentIndex + 1); }
        function prevSlide() { updateCarousel(currentIndex - 1); }
        if (prevBtn) prevBtn.addEventListener('click', prevSlide);
        if (nextBtn) nextBtn.addEventListener('click', nextSlide);
        dots.forEach((dot, idx) => dot.addEventListener('click', () => updateCarousel(idx)));
        let touchStartX = 0;
        containerEl.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
        containerEl.addEventListener('touchend', (e) => {
            let touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 30) nextSlide();
            if (touchEndX > touchStartX + 30) prevSlide();
        });
    }

    function renderizarProdutos() {
        let filtrados = [...produtos];
        if (categoriaAtiva !== "todos") filtrados = filtrados.filter(p => p.categoria === categoriaAtiva);
        if (termoBusca.trim() !== "") {
            const busca = termoBusca.toLowerCase();
            filtrados = filtrados.filter(p => p.nome.toLowerCase().includes(busca) || p.descricao.toLowerCase().includes(busca));
        }
        if (filtrados.length === 0) {
            container.innerHTML = `<div class="empty-message">😕 Nenhum produto encontrado.</div>`;
            return;
        }
        let html = "";
        for (let p of filtrados) {
            const badge = getStoreBadge(p.loja);
            const carrosselHtml = criarCarrossel(p.id, p.imagens);
            html += `
                <div class="product-card" data-prod-id="${p.id}">
                    ${carrosselHtml}
                    <div class="product-info">
                        <span class="store-badge ${badge.classe}">${badge.icon} ${badge.nome}</span>
                        <div class="product-title">${p.nome}</div>
                        <div class="product-desc">${p.descricao}</div>
                        <div class="price">${p.preco}</div>
                        <a href="${p.link}" target="_blank" rel="noopener noreferrer nofollow" class="buy-btn">👉 COMPRAR AGORA</a>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        for (let p of filtrados) {
            if (p.imagens.length > 1) ativarCarrossel(p.id, p.imagens);
        }
    }

    function setupCategorias() {
        const botoes = document.querySelectorAll(".cat-btn");
        botoes.forEach(btn => {
            btn.addEventListener("click", function() {
                botoes.forEach(b => b.classList.remove("active"));
                this.classList.add("active");
                categoriaAtiva = this.getAttribute("data-cat");
                renderizarProdutos();
            });
        });
    }
    function setupBusca() {
        searchInput.addEventListener("input", e => { termoBusca = e.target.value; renderizarProdutos(); });
    }
    function init() { renderizarProdutos(); setupCategorias(); setupBusca(); }
    init();
</script>
</body>
</html>
