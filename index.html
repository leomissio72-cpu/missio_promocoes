<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Profissional - Power BI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background-color: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 8px;
        }
        footer {
            text-align: center;
            padding: 10px;
            background-color: #007bff;
            color: white;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
        @media (max-width: 768px) {
            iframe {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Dashboard de Visualização de Dados</h1>
        <p>Ferramenta gratuita para análise e visualização profissional</p>
    </header>
    <div class="container">
        <h2>Relatório Power BI</h2>
        <iframe src="https://app.powerbi.com/view?r=eyJrIjoiYzNmZjEyOTAtMDJhMi00MGM2LTgzOGMtMWE1NGM0MjUyZTM3IiwidCI6Ijc0MmYyNGViLWYyOWMtNDQwMS04NGU1LTYxN2Q3MzQ0YjViNyJ9" allowfullscreen></iframe>
    </div>
    <footer>
        <p>&copy; 2026 - Plataforma Gratuita de Visualização</p>
    </footer>
</body>
</html>
